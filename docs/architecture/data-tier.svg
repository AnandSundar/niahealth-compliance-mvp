<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 800" font-family="Helvetica, Arial, sans-serif" font-size="13">
  <title>Data Tier Architecture</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
    <marker id="arrowred" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c0392b"/>
    </marker>
    <style>
      .label { font-weight: 600; }
      .small { font-size: 11px; fill: #555; }
      .box { fill: #fff; stroke: #2c3e50; stroke-width: 1.5; }
      .compute { fill: #eafaf1; stroke: #27ae60; stroke-width: 1.5; }
      .rds { fill: #fdedec; stroke: #c0392b; stroke-width: 1.5; }
      .s3phi { fill: #fef9e7; stroke: #f39c12; stroke-width: 1.5; }
      .s3audit { fill: #e8e8e8; stroke: #555; stroke-width: 1.5; }
      .kms { fill: #f4ecf7; stroke: #8e44ad; stroke-width: 1.5; }
      .proxy { fill: #d6eaf8; stroke: #2874a6; stroke-width: 1.5; }
    </style>
  </defs>

  <!-- Title -->
  <text x="700" y="25" text-anchor="middle" font-size="18" font-weight="700" fill="#2c3e50">NiaHealth - Data Tier Architecture</text>
  <text x="700" y="45" text-anchor="middle" class="small">RDS in isolated subnets, IAM auth via RDS Proxy, PHI bucket Macie-scanned, audit bucket Object-Lock</text>

  <!-- ============== COMPUTE ============== -->
  <rect x="40" y="80" width="240" height="380" rx="8" class="compute"/>
  <text x="160" y="103" text-anchor="middle" font-weight="700" fill="#196f3d">Compute Plane</text>

  <rect x="60" y="120" width="200" height="80" rx="6" class="box"/>
  <text x="160" y="145" text-anchor="middle" class="label">FastAPI App</text>
  <text x="160" y="163" text-anchor="middle" class="small">GET /health-summary</text>
  <text x="160" y="178" text-anchor="middle" class="small">POST /access-request</text>
  <text x="160" y="193" text-anchor="middle" class="small">POST /delete-my-data</text>

  <rect x="60" y="215" width="200" height="55" rx="6" class="box" fill="#fff5e6" stroke="#d35400"/>
  <text x="160" y="237" text-anchor="middle" class="label">Fargate Task</text>
  <text x="160" y="255" text-anchor="middle" class="small">IAM task role (ecs-task-role)</text>

  <rect x="60" y="290" width="200" height="80" rx="4" fill="#d5f5e3" stroke="#196f3d"/>
  <text x="160" y="310" text-anchor="middle" class="label">RDS IAM Auth Token</text>
  <text x="160" y="328" text-anchor="middle" class="small">boto3 RDS signer mints</text>
  <text x="160" y="343" text-anchor="middle" class="small">short-lived token (15 min)</text>
  <text x="160" y="358" text-anchor="middle" class="small">No static DB password in app</text>

  <rect x="60" y="385" width="200" height="60" rx="4" fill="#fff" stroke="#27ae60"/>
  <text x="160" y="407" text-anchor="middle" class="label">TLS to Proxy (client -&gt; proxy)</text>
  <text x="160" y="425" text-anchor="middle" class="small">rds.force_ssl=1 (proxy -&gt; DB)</text>

  <!-- ============== RDS PROXY ============== -->
  <rect x="320" y="220" width="240" height="180" rx="8" class="proxy"/>
  <text x="440" y="243" text-anchor="middle" font-weight="700" fill="#1a5276">RDS Proxy</text>

  <rect x="340" y="260" width="200" height="55" rx="6" class="box"/>
  <text x="440" y="282" text-anchor="middle" class="label">Connection pooler</text>
  <text x="440" y="300" text-anchor="middle" class="small">idle_client_timeout=1800</text>

  <rect x="340" y="330" width="200" height="55" rx="6" class="box" fill="#fff5e6" stroke="#2874a6"/>
  <text x="440" y="352" text-anchor="middle" class="label">IAM auth enforced</text>
  <text x="440" y="370" text-anchor="middle" class="small">Secrets from Secrets Manager</text>

  <!-- ============== RDS ============== -->
  <rect x="600" y="80" width="320" height="500" rx="8" class="rds"/>
  <text x="760" y="103" text-anchor="middle" font-weight="700" fill="#922b21">RDS Postgres 15 (Isolated Subnets)</text>

  <rect x="620" y="120" width="280" height="60" rx="6" class="box"/>
  <text x="760" y="142" text-anchor="middle" class="label">RDS Instance (db.t4g.medium)</text>
  <text x="760" y="160" text-anchor="middle" class="small">Multi-AZ, deletion_protection=true</text>

  <rect x="620" y="195" width="280" height="155" rx="4" fill="#fadbd8" stroke="#c0392b"/>
  <text x="640" y="217" class="label" fill="#922b21">Hardened config:</text>
  <text x="640" y="235" class="small">- storage_encrypted=true (rds_kms_key)</text>
  <text x="640" y="252" class="small">- iam_database_authentication_enabled=true</text>
  <text x="640" y="269" class="small">- publicly_accessible=false</text>
  <text x="640" y="286" class="small">- rds.force_ssl=1 (parameter group)</text>
  <text x="640" y="303" class="small">- backup_retention_period=35</text>
  <text x="640" y="320" class="small">- enabled_cloudwatch_logs_exports: postgresql, upgrade</text>
  <text x="640" y="337" class="small">- deletion_protection=true (even for terraform)</text>

  <rect x="620" y="365" width="280" height="80" rx="4" fill="#fff" stroke="#c0392b"/>
  <text x="640" y="385" class="label">Snapshots -&gt; S3 (encrypted, 35d)</text>
  <text x="640" y="403" class="small">KMS-encrypted automated snapshots.</text>
  <text x="640" y="420" class="small">CRR to ca-west-1 (KMS multi-Region).</text>
  <text x="640" y="437" class="small" fill="#922b21">Public access blocked at bucket.</text>

  <rect x="620" y="460" width="280" height="100" rx="4" fill="#fadbd8" stroke="#922b21"/>
  <text x="640" y="482" class="label" fill="#922b21">PHIPA s.18 / Law 25 §3.1 deletion:</text>
  <text x="640" y="500" class="small">POST /delete-my-data -&gt; app NULLs PHI columns</text>
  <text x="640" y="517" class="small">(hard delete, not soft delete).</text>
  <text x="640" y="534" class="small">Audit log entry retained 7 years regardless.</text>
  <text x="640" y="551" class="small" fill="#922b21">PHI tier is mutable by app design.</text>

  <!-- ============== S3 PHI BUCKET ============== -->
  <rect x="960" y="80" width="400" height="280" rx="8" class="s3phi"/>
  <text x="980" y="103" font-weight="700" fill="#7d6608">S3 - Data Tier (PHI bucket)</text>

  <rect x="980" y="120" width="360" height="50" rx="6" class="box"/>
  <text x="1160" y="142" text-anchor="middle" class="label">niahealth-data-{env}</text>
  <text x="1160" y="160" text-anchor="middle" class="small">Default-deny posture</text>

  <rect x="980" y="185" width="360" height="165" rx="4" fill="#fef9e7" stroke="#f39c12"/>
  <text x="1000" y="207" class="label" fill="#7d6608">4 public-access blocks (all on):</text>
  <text x="1000" y="225" class="small">- block_public_acls</text>
  <text x="1000" y="240" class="small">- block_public_policy</text>
  <text x="1000" y="255" class="small">- ignore_public_acls</text>
  <text x="1000" y="270" class="small">- restrict_public_buckets</text>
  <text x="1000" y="288" class="small">- versioning=true, KMS CMK (s3_phi_kms_key)</text>
  <text x="1000" y="305" class="small">- object_lock_enabled_for_bucket=false</text>
  <text x="1000" y="322" class="small">- lifecycle: Glacier IR @ 90d, expire 7y</text>
  <text x="1000" y="339" class="small" fill="#7d6608">- Macie daily discovery job</text>

  <!-- ============== APP LOGS BUCKET ============== -->
  <rect x="960" y="380" width="400" height="120" rx="8" fill="#fdf2e9" stroke="#d35400"/>
  <text x="980" y="403" font-weight="700" fill="#9a7d0a">S3 - App Uploads</text>

  <rect x="980" y="420" width="360" height="65" rx="6" class="box"/>
  <text x="1160" y="442" text-anchor="middle" class="label">niahealth-uploads-{env}</text>
  <text x="1160" y="460" text-anchor="middle" class="small">Same posture as data tier,</text>
  <text x="1160" y="475" text-anchor="middle" class="small">Macie scans nightly (no dedicated job)</text>

  <!-- ============== AUDIT BUCKET ============== -->
  <rect x="960" y="520" width="400" height="180" rx="8" class="s3audit"/>
  <text x="980" y="543" font-weight="700" fill="#333">S3 - Audit Bucket (Immutable)</text>

  <rect x="980" y="560" width="360" height="125" rx="4" fill="#f0f0f0" stroke="#555"/>
  <text x="1000" y="580" class="label">niahealth-audit-{env}</text>
  <text x="1000" y="598" class="small" fill="#c0392b">- object_lock_enabled_for_bucket=true</text>
  <text x="1000" y="613" class="small" fill="#c0392b">- object_lock_mode=COMPLIANCE (not Governance)</text>
  <text x="1000" y="628" class="small" fill="#c0392b">- default_retention_days=2557 (7 years)</text>
  <text x="1000" y="643" class="small">- versioning=true, all 4 public blocks</text>
  <text x="1000" y="658" class="small">- Lifecycle: Glacier IR @ 90d</text>
  <text x="1000" y="673" class="small" fill="#922b21">Compliance mode = root cannot delete early.</text>

  <!-- ============== KMS ============== -->
  <rect x="40" y="500" width="860" height="220" rx="8" class="kms"/>
  <text x="60" y="523" font-weight="700" fill="#6c3483">KMS Customer-Managed CMKs (annual rotation, deny delete)</text>

  <g font-size="12">
    <rect x="60" y="540" width="200" height="80" rx="6" fill="#fff" stroke="#8e44ad"/>
    <text x="160" y="562" text-anchor="middle" class="label">rds_kms_key</text>
    <text x="160" y="580" text-anchor="middle" class="small">RDS at-rest + snapshots</text>
    <text x="160" y="598" text-anchor="middle" class="small">ca-west-1 replica (CRR)</text>
    <text x="160" y="613" text-anchor="middle" class="small">enable_key_rotation=true</text>

    <rect x="280" y="540" width="200" height="80" rx="6" fill="#fff" stroke="#8e44ad"/>
    <text x="380" y="562" text-anchor="middle" class="label">s3_phi_kms_key</text>
    <text x="380" y="580" text-anchor="middle" class="small">Data tier + uploads</text>
    <text x="380" y="598" text-anchor="middle" class="small">Server-side encryption</text>
    <text x="380" y="613" text-anchor="middle" class="small">enable_key_rotation=true</text>

    <rect x="500" y="540" width="200" height="80" rx="6" fill="#fff" stroke="#8e44ad"/>
    <text x="600" y="562" text-anchor="middle" class="label">cloudtrail_kms_key</text>
    <text x="600" y="580" text-anchor="middle" class="small">CloudTrail log files</text>
    <text x="600" y="598" text-anchor="middle" class="small">Audit trail envelope</text>
    <text x="600" y="613" text-anchor="middle" class="small">enable_key_rotation=true</text>

    <rect x="720" y="540" width="160" height="80" rx="6" fill="#fff" stroke="#8e44ad"/>
    <text x="800" y="562" text-anchor="middle" class="label">cwl_kms_key</text>
    <text x="800" y="580" text-anchor="middle" class="small">CWL groups</text>
    <text x="800" y="598" text-anchor="middle" class="small">VPC Flow, ALB, etc.</text>
    <text x="800" y="613" text-anchor="middle" class="small">rotation=true</text>
  </g>

  <rect x="60" y="635" width="820" height="70" rx="4" fill="#f4ecf7" stroke="#8e44ad"/>
  <text x="80" y="657" class="label" fill="#6c3483">Key policy pattern (all 4 CMKs):</text>
  <text x="80" y="675" class="small">- Deny kms:ScheduleKeyDeletion for non-admin principals (compliance: 7y retention cannot be bypassed)</text>
  <text x="80" y="692" class="small">- Allow use via service roles (ecs-task, rds-proxy, firehose) + permission-boundary envelope</text>

  <!-- ============== Arrows ============== -->
  <line x1="260" y1="240" x2="320" y2="290" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="265" y="270" class="small">IAM auth token</text>

  <line x1="560" y1="290" x2="600" y2="150" stroke="#c0392b" stroke-width="2" marker-end="url(#arrowred)"/>
  <text x="510" y="220" class="small" fill="#c0392b">TLS, IAM-auth, pooled</text>

  <line x1="260" y1="180" x2="980" y2="150" stroke="#333" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="3 2"/>
  <text x="540" y="135" class="small">S3 read/write PHI</text>
</svg>
