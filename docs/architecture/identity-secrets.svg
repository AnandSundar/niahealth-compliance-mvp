<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 800" font-family="Helvetica, Arial, sans-serif" font-size="13">
  <title>Identity &amp; Secrets Architecture</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
    <marker id="arrowred" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c0392b"/>
    </marker>
    <style>
      .label { font-weight: 600; }
      .small { font-size: 11px; fill: #555; }
      .box { fill: #fff; stroke: #2c3e50; stroke-width: 1.5; }
      .human { fill: #fef9e7; stroke: #f39c12; stroke-width: 1.5; }
      .service { fill: #eafaf1; stroke: #27ae60; stroke-width: 1.5; }
      .secret { fill: #fdedec; stroke: #c0392b; stroke-width: 1.5; }
      .oidc { fill: #e8f8f5; stroke: #16a085; stroke-width: 1.5; }
      .bg { fill: #f4f6f7; stroke: #95a5a6; stroke-width: 1; stroke-dasharray: 4 2; }
    </style>
  </defs>

  <!-- Title -->
  <text x="700" y="25" text-anchor="middle" font-size="18" font-weight="700" fill="#2c3e50">NiaHealth - Identity &amp; Secrets Architecture</text>
  <text x="700" y="45" text-anchor="middle" class="small">IAM Identity Center for humans, OIDC for CI, per-service roles with permission boundaries, Secrets Manager with rotation</text>

  <!-- ============== HUMANS ============== -->
  <rect x="40" y="80" width="420" height="380" rx="8" class="bg"/>
  <text x="60" y="103" font-weight="700" fill="#2c3e50">Humans (MFA enforced)</text>

  <!-- Admin / Dev / Auditor / Deploy -->
  <rect x="60" y="120" width="180" height="55" rx="6" class="human"/>
  <text x="150" y="142" text-anchor="middle" class="label">Admin</text>
  <text x="150" y="160" text-anchor="middle" class="small">Permission set: admin</text>

  <rect x="260" y="120" width="180" height="55" rx="6" class="human"/>
  <text x="350" y="142" text-anchor="middle" class="label">Developer</text>
  <text x="350" y="160" text-anchor="middle" class="small">Permission set: developer</text>

  <rect x="60" y="195" width="180" height="55" rx="6" class="human"/>
  <text x="150" y="217" text-anchor="middle" class="label">Auditor</text>
  <text x="150" y="235" text-anchor="middle" class="small">Permission set: auditor (read-only)</text>

  <rect x="260" y="195" width="180" height="55" rx="6" class="human"/>
  <text x="350" y="217" text-anchor="middle" class="label">Deploy (CI)</text>
  <text x="350" y="235" text-anchor="middle" class="small">Permission set: deploy</text>

  <!-- IAM Identity Center -->
  <rect x="60" y="280" width="380" height="65" rx="6" fill="#3498db" stroke="#1f618d"/>
  <text x="250" y="305" text-anchor="middle" class="label" fill="#fff">IAM Identity Center (AWS-recommended)</text>
  <text x="250" y="325" text-anchor="middle" class="small" fill="#fff">MFA enforced at IdC level - replaces long-lived IAM users</text>

  <!-- Break-glass IAM user -->
  <rect x="60" y="370" width="380" height="70" rx="6" fill="#fadbd8" stroke="#c0392b"/>
  <text x="250" y="392" text-anchor="middle" class="label" fill="#922b21">Break-glass IAM user (only IAM user in account)</text>
  <text x="250" y="410" text-anchor="middle" class="small" fill="#922b21">MFA + Deny iam:CreateAccessKey, iam:UpdateAssumeRolePolicy,</text>
  <text x="250" y="425" text-anchor="middle" class="small" fill="#922b21">kms:ScheduleKeyDeletion, s3:DeleteObject w/o MFA on audit</text>

  <!-- ============== CI / OIDC ============== -->
  <rect x="500" y="80" width="420" height="220" rx="8" class="oidc"/>
  <text x="520" y="103" font-weight="700" fill="#0e6655">CI/CD (GitHub Actions via OIDC)</text>

  <rect x="520" y="120" width="380" height="55" rx="6" class="box"/>
  <text x="710" y="142" text-anchor="middle" class="label">GitHub Actions Workflow</text>
  <text x="710" y="160" text-anchor="middle" class="small">aws-actions/configure-aws-credentials@v4</text>

  <rect x="520" y="195" width="380" height="85" rx="6" class="oidc"/>
  <text x="710" y="217" text-anchor="middle" class="label" fill="#0e6655">OIDC Trust Policy (pinned)</text>
  <text x="540" y="237" class="small">sub: repo:&lt;org&gt;/&lt;repo&gt;:ref:refs/heads/main</text>
  <text x="540" y="254" class="small">workflow_file: infra/.github/workflows/apply.yml</text>
  <text x="540" y="271" class="small">aud: sts.amazonaws.com</text>

  <!-- ============== SERVICE IDENTITIES ============== -->
  <rect x="500" y="320" width="420" height="280" rx="8" class="service"/>
  <text x="520" y="343" font-weight="700" fill="#196f3d">Service Identities (per-service roles + boundaries)</text>

  <rect x="520" y="360" width="180" height="55" rx="6" class="box"/>
  <text x="610" y="382" text-anchor="middle" class="label">ecs-task-role</text>
  <text x="610" y="400" text-anchor="middle" class="small">S3 read PHI, CWL, SM read</text>

  <rect x="720" y="360" width="180" height="55" rx="6" class="box"/>
  <text x="810" y="382" text-anchor="middle" class="label">rds-proxy-role</text>
  <text x="810" y="400" text-anchor="middle" class="small">rds-db:connect on proxy</text>

  <rect x="520" y="430" width="180" height="55" rx="6" class="box"/>
  <text x="610" y="452" text-anchor="middle" class="label">lambda-rotation-role</text>
  <text x="610" y="470" text-anchor="middle" class="small">secretsmanager:*/RotateSecret</text>

  <rect x="720" y="430" width="180" height="55" rx="6" class="box"/>
  <text x="810" y="452" text-anchor="middle" class="label">firehose-role</text>
  <text x="810" y="470" text-anchor="middle" class="small">write to S3 audit bucket</text>

  <rect x="520" y="500" width="380" height="80" rx="4" fill="#d5f5e3" stroke="#196f3d"/>
  <text x="540" y="522" class="label" fill="#196f3d">Permission boundary (max envelope):</text>
  <text x="540" y="540" class="small">deny iam:Create*, iam:Attach*, kms:*,</text>
  <text x="540" y="555" class="small">deny wildcard actions on * resources</text>
  <text x="540" y="572" class="small">Each service role attached to this boundary.</text>

  <!-- ============== COGNITO ============== -->
  <rect x="960" y="80" width="400" height="220" rx="8" fill="#f4ecf7" stroke="#8e44ad"/>
  <text x="980" y="103" font-weight="700" fill="#6c3483">Cognito User Pool (patient auth)</text>

  <rect x="980" y="120" width="360" height="55" rx="6" class="box"/>
  <text x="1160" y="142" text-anchor="middle" class="label">Cognito User Pool</text>
  <text x="1160" y="160" text-anchor="middle" class="small">Issues RS256 JWTs (sub = patient_id, groups = roles)</text>

  <rect x="980" y="195" width="360" height="85" rx="6" fill="#fff" stroke="#8e44ad"/>
  <text x="1160" y="217" text-anchor="middle" class="label" fill="#6c3483">App middleware validates JWT</text>
  <text x="1000" y="237" class="small">- algorithms=["RS256"] (no none/HS256)</text>
  <text x="1000" y="254" class="small">- audience + issuer verified</text>
  <text x="1000" y="271" class="small">- leeway=60s, JWKS cache 10min</text>

  <!-- ============== SECRETS ============== -->
  <rect x="960" y="320" width="400" height="280" rx="8" class="secret"/>
  <text x="980" y="343" font-weight="700" fill="#922b21">AWS Secrets Manager (30-day rotation)</text>

  <rect x="980" y="360" width="360" height="55" rx="6" class="box"/>
  <text x="1160" y="382" text-anchor="middle" class="label">RDS master password</text>
  <text x="1160" y="400" text-anchor="middle" class="small">Auto-rotate via Lambda (lambda-rotation-role)</text>

  <rect x="980" y="430" width="360" height="55" rx="6" class="box"/>
  <text x="1160" y="452" text-anchor="middle" class="label">Cognito client secret</text>
  <text x="1160" y="470" text-anchor="middle" class="small">Future third-party keys (placeholder)</text>

  <rect x="980" y="500" width="360" height="80" rx="4" fill="#fadbd8" stroke="#c0392b"/>
  <text x="1000" y="522" class="label" fill="#922b21">Rotation Lambda IAM (least-privilege):</text>
  <text x="1000" y="540" class="small">secretsmanager:GetSecretValue, PutSecretValue,</text>
  <text x="1000" y="555" class="small">DescribeSecret, UpdateSecretVersionStage</text>
  <text x="1000" y="572" class="small" fill="#c0392b">Deny: rds:Modify*, rds:Delete*</text>

  <!-- ============== ACCESS ANALYZER ============== -->
  <rect x="40" y="490" width="420" height="270" rx="8" fill="#fdebd0" stroke="#d35400"/>
  <text x="60" y="513" font-weight="700" fill="#9a7d0a">IAM Access Analyzer (account-wide)</text>

  <rect x="60" y="530" width="380" height="65" rx="6" class="box"/>
  <text x="250" y="552" text-anchor="middle" class="label">Active analyzer</text>
  <text x="250" y="572" text-anchor="middle" class="small">Detects external access (cross-account, public)</text>

  <rect x="60" y="610" width="380" height="60" rx="4" fill="#fff" stroke="#d35400"/>
  <text x="80" y="632" class="label" fill="#9a7d0a">Reviewed weekly (runbook):</text>
  <text x="80" y="650" class="small">Findings triaged and remediated; archived</text>
  <text x="80" y="667" class="small">findings feed Security Hub.</text>

  <rect x="60" y="685" width="380" height="60" rx="4" fill="#fef9e7" stroke="#f39c12"/>
  <text x="80" y="707" class="label" fill="#7d6608">EventBridge rule on break-glass login:</text>
  <text x="80" y="725" class="small">aws.console-login event -&gt; SNS topic (paging within 60s)</text>

  <!-- ============== Arrows ============== -->
  <line x1="250" y1="280" x2="250" y2="370" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="260" y="335" class="small">assumes</text>

  <line x1="710" y1="280" x2="710" y2="320" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="720" y="305" class="small">assumes deploy role</text>

  <line x1="1160" y1="280" x2="1160" y2="320" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="1170" y="305" class="small">reads</text>
</svg>
