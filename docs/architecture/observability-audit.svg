<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 850" font-family="Helvetica, Arial, sans-serif" font-size="13">
  <title>Logging, Monitoring &amp; Compliance Posture</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
    <marker id="arrowred" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c0392b"/>
    </marker>
    <style>
      .label { font-weight: 600; }
      .small { font-size: 11px; fill: #555; }
      .box { fill: #fff; stroke: #2c3e50; stroke-width: 1.5; }
      .source { fill: #eaf2f8; stroke: #2874a6; stroke-width: 1.5; }
      .ct { fill: #fef9e7; stroke: #f39c12; stroke-width: 1.5; }
      .cwl { fill: #e8f8f5; stroke: #16a085; stroke-width: 1.5; }
      .audit { fill: #e8e8e8; stroke: #555; stroke-width: 1.5; }
      .detector { fill: #fdedec; stroke: #c0392b; stroke-width: 1.5; }
      .hub { fill: #f4ecf7; stroke: #8e44ad; stroke-width: 1.5; }
      .paging { fill: #fadbd8; stroke: #922b21; stroke-width: 1.5; }
    </style>
  </defs>

  <!-- Title -->
  <text x="700" y="25" text-anchor="middle" font-size="18" font-weight="700" fill="#2c3e50">NiaHealth - Logging, Monitoring &amp; Compliance Posture</text>
  <text x="700" y="45" text-anchor="middle" class="small">CloudTrail split (mgmt -&gt; CWL, data -&gt; S3), Macie 24h MTTD, Security Hub -&gt; EventBridge -&gt; SNS paging</text>

  <!-- ============== LOG SOURCES (left column) ============== -->
  <rect x="40" y="80" width="240" height="660" rx="8" class="source"/>
  <text x="160" y="103" text-anchor="middle" font-weight="700" fill="#1a5276">Log Sources</text>

  <rect x="60" y="120" width="200" height="50" rx="6" class="box"/>
  <text x="160" y="142" text-anchor="middle" class="label">VPC Flow Logs</text>
  <text x="160" y="160" text-anchor="middle" class="small">client_payload_enabled=false</text>

  <rect x="60" y="185" width="200" height="50" rx="6" class="box"/>
  <text x="160" y="207" text-anchor="middle" class="label">ALB Access Logs</text>
  <text x="160" y="225" text-anchor="middle" class="small">All requests, 7y retention</text>

  <rect x="60" y="250" width="200" height="50" rx="6" class="box"/>
  <text x="160" y="272" text-anchor="middle" class="label">WAF Logs</text>
  <text x="160" y="290" text-anchor="middle" class="small">Allowed + blocked</text>

  <rect x="60" y="315" width="200" height="50" rx="6" class="box"/>
  <text x="160" y="337" text-anchor="middle" class="label">RDS / Proxy Logs</text>
  <text x="160" y="355" text-anchor="middle" class="small">postgresql, upgrade</text>

  <rect x="60" y="380" width="200" height="50" rx="6" class="box" fill="#fff5e6" stroke="#2874a6"/>
  <text x="160" y="402" text-anchor="middle" class="label">CloudTrail Mgmt Events</text>
  <text x="160" y="420" text-anchor="middle" class="small">low volume</text>

  <rect x="60" y="445" width="200" height="50" rx="6" class="box" fill="#fdedec" stroke="#c0392b"/>
  <text x="160" y="467" text-anchor="middle" class="label" fill="#922b21">CloudTrail Data Events</text>
  <text x="160" y="485" text-anchor="middle" class="small" fill="#c0392b">S3 data plane (high volume)</text>

  <rect x="60" y="510" width="200" height="50" rx="6" class="box" fill="#fef9e7" stroke="#d35400"/>
  <text x="160" y="532" text-anchor="middle" class="label">App Audit Writes</text>
  <text x="160" y="550" text-anchor="middle" class="small">access-request, delete-my-data</text>

  <rect x="60" y="575" width="200" height="50" rx="6" class="box"/>
  <text x="160" y="597" text-anchor="middle" class="label">Config Snapshots</text>
  <text x="160" y="615" text-anchor="middle" class="small">Resource config history</text>

  <rect x="60" y="640" width="200" height="80" rx="4" fill="#fff" stroke="#2874a6"/>
  <text x="160" y="660" text-anchor="middle" class="label" fill="#1a5276">All to CWL log group</text>
  <text x="160" y="678" text-anchor="middle" class="small">(except data events +</text>
  <text x="160" y="693" text-anchor="middle" class="small">app audit, which go</text>
  <text x="160" y="708" text-anchor="middle" class="small">direct to S3 audit)</text>

  <!-- ============== CLOUDWATCH LOGS ============== -->
  <rect x="320" y="80" width="280" height="380" rx="8" class="cwl"/>
  <text x="460" y="103" text-anchor="middle" font-weight="700" fill="#0e6655">CloudWatch Logs (mgmt only)</text>

  <rect x="340" y="120" width="240" height="55" rx="6" class="box"/>
  <text x="460" y="142" text-anchor="middle" class="label">Log group: niahealth-mgmt</text>
  <text x="460" y="160" text-anchor="middle" class="small">KMS encrypted (cwl_kms_key), 2557d</text>

  <rect x="340" y="190" width="240" height="55" rx="6" class="box"/>
  <text x="460" y="212" text-anchor="middle" class="label">Subscription filters</text>
  <text x="460" y="230" text-anchor="middle" class="small">Fan to Kinesis Firehose</text>

  <rect x="340" y="260" width="240" height="55" rx="6" class="box" fill="#fff5e6" stroke="#16a085"/>
  <text x="460" y="282" text-anchor="middle" class="label">Metric filters</text>
  <text x="460" y="300" text-anchor="middle" class="small">Alarms on threshold</text>

  <rect x="340" y="330" width="240" height="120" rx="4" fill="#e8f8f5" stroke="#16a085"/>
  <text x="360" y="352" class="label" fill="#0e6655">Why split mgmt vs data?</text>
  <text x="360" y="370" class="small">Mgmt events = low volume,</text>
  <text x="360" y="385" class="small">good fit for CWL + metric</text>
  <text x="360" y="400" class="small">filters + alarms.</text>
  <text x="360" y="418" class="small" fill="#c0392b">Data events = high volume,</text>
  <text x="360" y="433" class="small" fill="#c0392b">expensive as CWL data.</text>

  <!-- ============== KINESIS FIREHOSE ============== -->
  <rect x="320" y="480" width="280" height="100" rx="8" fill="#d6eaf8" stroke="#2874a6"/>
  <text x="460" y="503" text-anchor="middle" font-weight="700" fill="#1a5276">Kinesis Firehose</text>
  <text x="460" y="523" text-anchor="middle" class="small">Buffers + batches CWL events</text>
  <text x="460" y="540" text-anchor="middle" class="small">to S3 audit bucket (60s buffer,</text>
  <text x="460" y="557" text-anchor="middle" class="small">Parquet conversion optional)</text>

  <!-- ============== S3 AUDIT ============== -->
  <rect x="640" y="600" width="320" height="180" rx="8" class="audit"/>
  <text x="800" y="623" text-anchor="middle" font-weight="700" fill="#333">S3 - niahealth-audit-{env}</text>

  <rect x="660" y="640" width="280" height="125" rx="4" fill="#f0f0f0" stroke="#555"/>
  <text x="680" y="660" class="label">Object Lock COMPLIANCE</text>
  <text x="680" y="678" class="small">- Default retention 2557 days (7y)</text>
  <text x="680" y="693" class="small">- All 4 public-access blocks</text>
  <text x="680" y="708" class="small">- Versioning=true, KMS CMK</text>
  <text x="680" y="723" class="small">- Lifecycle: Glacier IR @ 90d</text>
  <text x="680" y="740" class="small" fill="#c0392b">- Compliance mode = immutable (root cannot delete)</text>
  <text x="680" y="757" class="small" fill="#c0392b">- Survives insider + regulator subpoena for 7y</text>

  <!-- ============== THREAT DETECTION (right top) ============== -->
  <rect x="640" y="80" width="320" height="500" rx="8" class="detector"/>
  <text x="800" y="103" text-anchor="middle" font-weight="700" fill="#922b21">Threat Detection &amp; Posture</text>

  <rect x="660" y="120" width="280" height="80" rx="6" class="box" fill="#fadbd8" stroke="#c0392b"/>
  <text x="800" y="142" text-anchor="middle" class="label" fill="#922b21">GuardDuty</text>
  <text x="800" y="160" text-anchor="middle" class="small">S3 Protection, Malware</text>
  <text x="800" y="175" text-anchor="middle" class="small">Protection for ECS plans</text>
  <text x="800" y="193" text-anchor="middle" class="small" fill="#c0392b">Findings -&gt; Security Hub</text>

  <rect x="660" y="215" width="280" height="100" rx="6" class="box" fill="#fef9e7" stroke="#f39c12"/>
  <text x="800" y="237" text-anchor="middle" class="label">Macie</text>
  <text x="800" y="255" text-anchor="middle" class="small">Daily discovery job on</text>
  <text x="800" y="270" text-anchor="middle" class="small">data-tier + uploads buckets.</text>
  <text x="800" y="288" text-anchor="middle" class="small">MTTD: 24h (object exposure</text>
  <text x="800" y="303" text-anchor="middle" class="small">to Macie classification).</text>

  <rect x="660" y="330" width="280" height="100" rx="6" class="box" fill="#d6eaf8" stroke="#2874a6"/>
  <text x="800" y="352" text-anchor="middle" class="label" fill="#1a5276">AWS Config</text>
  <text x="800" y="370" text-anchor="middle" class="small">Recorder + delivery channel</text>
  <text x="800" y="385" text-anchor="middle" class="small">7 must-have managed rules:</text>
  <text x="800" y="400" text-anchor="middle" class="small">s3-bucket-public-read-prohibited,</text>
  <text x="800" y="415" text-anchor="middle" class="small">s3-bucket-public-write-prohibited,</text>
  <text x="800" y="430" text-anchor="middle" class="small">encrypted-at-rest, iam-root-mfa, ...</text>

  <rect x="660" y="445" width="280" height="115" rx="6" class="hub"/>
  <text x="800" y="467" text-anchor="middle" class="label" fill="#6c3483">Security Hub</text>
  <text x="800" y="485" text-anchor="middle" class="small">Standards:</text>
  <text x="800" y="500" text-anchor="middle" class="small">- CIS AWS Foundations v3.0</text>
  <text x="800" y="515" text-anchor="middle" class="small">- AWS Foundational Security</text>
  <text x="800" y="530" text-anchor="middle" class="small">  Best Practices (FSBP)</text>
  <text x="800" y="548" text-anchor="middle" class="small">Aggregates: GuardDuty + Macie + Config +</text>
  <text x="800" y="555" class="small">Access Analyzer + Inspector.</text>

  <!-- ============== PAGING (right) ============== -->
  <rect x="1000" y="80" width="360" height="380" rx="8" class="paging"/>
  <text x="1180" y="103" text-anchor="middle" font-weight="700" fill="#922b21">Paging &amp; Notification (1h MTTD)</text>

  <rect x="1020" y="120" width="320" height="65" rx="6" class="box" fill="#fadbd8" stroke="#c0392b"/>
  <text x="1180" y="142" text-anchor="middle" class="label" fill="#922b21">EventBridge rule</text>
  <text x="1180" y="160" text-anchor="middle" class="small">source: aws.securityhub</text>
  <text x="1180" y="175" text-anchor="middle" class="small">detail-type: Security Hub Finding</text>

  <rect x="1020" y="200" width="320" height="65" rx="6" class="box"/>
  <text x="1180" y="222" text-anchor="middle" class="label">Filter: severity CRITICAL|HIGH</text>
  <text x="1180" y="240" text-anchor="middle" class="small">account in trusted orgs</text>
  <text x="1180" y="255" text-anchor="middle" class="small">workflow_status = NEW</text>

  <rect x="1020" y="280" width="320" height="65" rx="6" class="box" fill="#fadbd8" stroke="#c0392b"/>
  <text x="1180" y="302" text-anchor="middle" class="label" fill="#922b21">SNS Topic: niahealth-incidents</text>
  <text x="1180" y="320" text-anchor="middle" class="small">PagerDuty / Opsgenie integration</text>
  <text x="1180" y="335" text-anchor="middle" class="small">+ email to on-call rotation</text>

  <rect x="1020" y="360" width="320" height="85" rx="4" fill="#fef9e7" stroke="#f39c12"/>
  <text x="1040" y="382" class="label" fill="#7d6608">MTTD Targets (documented):</text>
  <text x="1040" y="400" class="small">- Macie PII exposure: 24h (data tier)</text>
  <text x="1040" y="415" class="small">- GuardDuty critical: 1h</text>
  <text x="1040" y="430" class="small">- Config non-compliant (PHI): 1h</text>

  <!-- ============== POSTURE METRICS (right bottom) ============== -->
  <rect x="1000" y="480" width="360" height="310" rx="8" fill="#d5f5e3" stroke="#27ae60"/>
  <text x="1180" y="503" text-anchor="middle" font-weight="700" fill="#196f3d">Ad-hoc Queries &amp; Reports</text>

  <rect x="1020" y="520" width="320" height="55" rx="6" class="box"/>
  <text x="1180" y="542" text-anchor="middle" class="label">Athena over S3 audit</text>
  <text x="1180" y="560" text-anchor="middle" class="small">SQL queries on CloudTrail JSON</text>

  <rect x="1020" y="590" width="320" height="55" rx="6" class="box"/>
  <text x="1180" y="612" text-anchor="middle" class="label">Security Hub Insights</text>
  <text x="1180" y="630" text-anchor="middle" class="small">Trend by control, resource, account</text>

  <rect x="1020" y="660" width="320" height="115" rx="4" fill="#fff" stroke="#27ae60"/>
  <text x="1040" y="682" class="label" fill="#196f3d">72h breach report clock (PIPEDA s.10.1):</text>
  <text x="1040" y="700" class="small">- T0: object exposure (RROSH risk)</text>
  <text x="1040" y="715" class="small">- T0 + 24h: Macie classification</text>
  <text x="1040" y="730" class="small">  (clock effective start)</text>
  <text x="1040" y="745" class="small">- T0 + 96h: PIPEDA hard deadline</text>
  <text x="1040" y="762" class="small" fill="#c0392b">Documented in runbook preamble.</text>

  <!-- ============== Arrows (sources to CWL) ============== -->
  <g stroke="#333" stroke-width="1.5" fill="none">
    <line x1="260" y1="145" x2="320" y2="145" marker-end="url(#arrow)"/>
    <line x1="260" y1="210" x2="320" y2="180" marker-end="url(#arrow)"/>
    <line x1="260" y1="275" x2="320" y2="195" marker-end="url(#arrow)"/>
    <line x1="260" y1="340" x2="320" y2="210" marker-end="url(#arrow)"/>
    <line x1="260" y1="405" x2="320" y2="225" marker-end="url(#arrow)"/>
  </g>

  <!-- data events to S3 directly (red) -->
  <g stroke="#c0392b" stroke-width="2" fill="none">
    <path d="M 260 470 Q 450 540 660 680" marker-end="url(#arrowred)"/>
    <path d="M 260 535 Q 450 600 660 700" marker-end="url(#arrowred)"/>
  </g>
  <text x="380" y="600" class="small" fill="#c0392b">direct to S3 (high volume)</text>

  <!-- CWL to Firehose -->
  <line x1="460" y1="460" x2="460" y2="480" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="600" y1="530" x2="640" y2="660" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Security Hub to EventBridge -->
  <line x1="940" y1="500" x2="1000" y2="200" stroke="#c0392b" stroke-width="2" marker-end="url(#arrowred)" stroke-dasharray="4 2"/>
  <text x="940" y="350" class="small" fill="#c0392b">Critical/High</text>
</svg>
